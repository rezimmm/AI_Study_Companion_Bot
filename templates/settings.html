<!DOCTYPE html>
<html>
<head>
<title>System Settings</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
 background:#050510;
 color:white;
 font-family:Poppins;
}
.box{
 background:#0b0f1f;
 padding:25px;
 border-radius:18px;
 border:1px solid rgba(255,255,255,.12);
 box-shadow:0 0 25px rgba(0,0,0,.7);
}
</style>

</head>

<body class="p-4">

<h2>🛠 System Settings</h2>
<p>Control bot behavior & system preferences</p>

<div class="box mt-4">
<form method="post" action="/admin/settings">

<label class="form-label">🛑 Maintenance Mode</label>
<select name="maintenance" class="form-select">
<option value="0" {% if maintenance == 0 %}selected{% endif %}>OFF</option>
<option value="1" {% if maintenance == 1 %}selected{% endif %}>ON</option>
</select>

<br>

<label class="form-label">🤖 Bot Status</label>
<select name="bot_enabled" class="form-select">
<option value="1" {% if bot_enabled == 1 %}selected{% endif %}>Enabled</option>
<option value="0" {% if bot_enabled == 0 %}selected{% endif %}>Disabled</option>
</select>

<br>

<label class="form-label">🌈 Theme</label>
<select name="theme" class="form-select">
<option value="dark" {% if theme == 'dark' %}selected{% endif %}>Dark</option>
<option value="light" {% if theme == 'light' %}selected{% endif %}>Light</option>
</select>

<br><br>

<button class="btn btn-primary">Save Changes</button>
<a class="btn btn-secondary" href="/admin">Back</a>

</form>
</div>

</body>
</html>
