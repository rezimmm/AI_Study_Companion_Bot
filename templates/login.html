<!DOCTYPE html>
<html>
<head>
<title>Admin Login</title>

<link rel="stylesheet"
 href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;700&display=swap');

body{
  background:#020617;
  font-family:"Poppins",sans-serif;
  color:white;
  overflow:hidden;
  min-height:100vh;
}

.bg-animate{
  position:fixed;
  inset:0;
  background:radial-gradient(circle at 10% 20%,#6b46ff,transparent 30%),
             radial-gradient(circle at 80% 0,#00ffe7,transparent 25%),
             radial-gradient(circle at 50% 100%,#ff00ff,transparent 30%);
  filter:blur(60px);
  animation: glow 10s infinite alternate;
}
@keyframes glow{
  from{ transform:scale(1);}
  to{ transform:scale(1.2);}
}

.wrapper{
  position:relative;
  max-width:480px;
  margin:auto;
  top:12vh;
  z-index:3;
}

.login-box{
  background:linear-gradient(145deg, rgba(8,16,46,.9), rgba(5,8,25,.95));
  padding:35px;
  border-radius:18px;
  border:1px solid rgba(255,255,255,.25);
  box-shadow:0 0 50px rgba(0,0,0,.6);
  backdrop-filter:blur(12px);
  position:relative;
}

.login-box::before{
  content:"";
  position:absolute;
  inset:-2px;
  border-radius:18px;
  background:conic-gradient(#7c4dff,#00ffe7,#ff00ff,#7c4dff);
  filter:blur(18px);
  opacity:.55;
  z-index:-1;
  animation:borderSpin 6s linear infinite;
}

@keyframes borderSpin{
  100%{ transform:rotate(360deg);}
}

input{
  background:#020a24!important;
  border:1px solid rgba(255,255,255,.4)!important;
  color:white!important;
  border-radius:12px!important;
  padding:12px;
}

.btn-login{
  width:100%;
  background:linear-gradient(45deg,#7c4dff,#9b59ff,#ff00ff);
  border:none;
  padding:12px;
  border-radius:12px;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="bg-animate"></div>

<div class="wrapper">
<div class="login-box">

<h2>🔐 Secure Admin Login</h2>
<p id="subtitle">Step 1 — Enter Admin Key</p>
<hr style="opacity:.3">

<!-- STEP 1 -->
<form method="post" id="keyForm">
  <input class="form-control mt-2"
   type="password"
   name="key"
   placeholder="Enter Admin Key"
   required>

  <button class="btn btn-login mt-3">
  🚀 Continue
  </button>
</form>

<!-- STEP 2 (Hidden initially) -->
<form method="post" id="otpForm" action="/admin/verify_otp" style="display:none">

  <input class="form-control mt-2"
   name="otp"
   placeholder="Enter 6-digit OTP"
   maxlength="6" required>

  <button class="btn btn-login mt-3">
  ✅ Verify OTP
  </button>

  <p class="mt-2" style="opacity:.7">OTP sent to Admin (Bot/Email)</p>
</form>

</div>
</div>

<script>
/* If backend redirects here with ?otp=1 show OTP box */
if(window.location.search.includes("otp=1")){
 document.getElementById("keyForm").style.display="none";
 document.getElementById("otpForm").style.display="block";
 document.getElementById("subtitle").innerText = "Step 2 — Verify OTP";
}
</script>

</body>
</html>
