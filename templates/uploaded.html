<!DOCTYPE html>
<html>
<head>
<title>PDF Uploaded</title>

<link rel="stylesheet"
 href="https://cdn.jsdelivr.net/npm/bootstrap@5/dist/css/bootstrap.min.css">

<style>
body{
    background: radial-gradient(circle at top, #1f1f3a, #050509);
    color:white;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    margin:0;
    font-family: 'Segoe UI', sans-serif;
}

/* Glass Card */
.box{
    width: 900px;
    padding:40px;
    border-radius:18px;
    border:1px solid rgba(255,255,255,0.2);
    background: rgba(10,10,20,0.85);
    backdrop-filter: blur(18px);
    box-shadow:0 0 60px rgba(0,0,0,0.75);
}

/* Title */
.title{
    font-size:30px;
    font-weight:800;
}

/* Info Panel */
.info{
    background:rgba(255,255,255,0.06);
    padding:18px;
    border-radius:12px;
    border:1px solid rgba(255,255,255,0.15);
}

/* Button Group */
.actions a{
    width:100%;
    margin-top:10px;
    padding:12px;
    border-radius:10px;
    font-size:18px;
    font-weight:600;
    transition:0.3s;
}

/* Individual Button Colors */
.sum{
    background:#6f9cff;
    border:none;
}
.sum:hover{
    background:#8fb2ff;
    transform:scale(1.03);
    box-shadow:0 0 20px rgba(120,170,255,0.6);
}

.quiz{
    background:#7c4dff;
    border:none;
}
.quiz:hover{
    background:#9c6cff;
    transform:scale(1.03);
    box-shadow:0 0 20px rgba(160,120,255,0.6);
}

.down{
    background:#3cb371;
    border:none;
}
.down:hover{
    background:#57d18c;
    transform:scale(1.03);
    box-shadow:0 0 20px rgba(80,200,130,0.6);
}

/* Loader */
.loader-box{
    margin-top:20px;
    background:#2b2b44;
    border-left:5px solid #ffc107;
    padding:12px;
    border-radius:10px;
}

</style>
</head>

<body>

<div class="box">

    <h2 class="title">✅ PDF Uploaded Successfully</h2>
    <p class="text-secondary">
        Your PDF is ready. Choose what you’d like to do next 👇
    </p>

    <div class="info mt-3">
        <p><b>📄 File:</b> {{filename}}</p>
        <p><b>🧾 Extracted Text Length:</b> {{length}}</p>
    </div>

    <hr>

    <h4 class="mb-3">Next Actions</h4>

    <div class="actions">

        <a class="btn sum"
           href="/summarize"
           onclick="showLoader()">
            📝 Generate AI Summary
        </a>

        <div id="loader" style="display:none" class="loader-box">
            ⏳ Generating summary… This may take 30–90 seconds…
        </div>

        <a class="btn quiz"
           href="/quiz">
            🧠 Generate Interactive Quiz
        </a>

        <a class="btn down"
           href="/download">
            ⬇ Download Extracted Text
        </a>
    </div>
</div>

<script>
function showLoader(){
    document.getElementById("loader").style.display = "block";
}
</script>

</body>
</html>
