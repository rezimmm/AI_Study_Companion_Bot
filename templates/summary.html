<!DOCTYPE html>
<html>
<head>
<title>PDF Summary</title>

<link rel="stylesheet"
 href="https://cdn.jsdelivr.net/npm/bootstrap@5/dist/css/bootstrap.min.css">

<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap');

body{
    background: radial-gradient(circle at top, #1a1a2e, #0b0b0f);
    color:#eaeaea;
    font-family: "Poppins", sans-serif;
    min-height:100vh;
}

/* Center Layout */
.container-center{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.card-box{
    background: rgba(18,18,26,0.92);
    padding:30px;
    border-radius:18px;
    border:1px solid rgba(255,255,255,0.12);
    box-shadow:0 0 40px rgba(0,0,0,0.7);
    width:100%;
    max-width:900px;
    backdrop-filter: blur(12px);
    position:relative;
}

/* Glowing Border Effect */
.card-box::before{
    content:"";
    position:absolute;
    inset:-3px;
    border-radius:18px;
    background:linear-gradient(45deg,#7c4dff,#00eaff,#ff00ff);
    z-index:-1;
    filter:blur(20px);
    opacity:.25;
}

h2{
    font-weight:800;
    letter-spacing:1px;
}

.subtitle{
    opacity:0.8;
    font-size:14px;
}

.divider{
    height:1px;
    background:linear-gradient(to right,#5a5af5,transparent);
    margin:12px 0 20px 0;
}

/* Summary Scroll Area */
.summary-container{
    max-height:65vh;
    overflow-y:auto;
    padding-right:6px;
    scroll-behavior:smooth;
}

.summary-container::-webkit-scrollbar{
    width:8px;
}

.summary-container::-webkit-scrollbar-thumb{
    background:#6b6bff;
    border-radius:10px;
}

.summary-container::-webkit-scrollbar-track{
    background:#1b1b24;
}

/* Text */
.summary-text{
    white-space:pre-wrap;
    font-size:17px;
    line-height:1.7;
    animation:fadeIn .6s ease;
}

@keyframes fadeIn{
    from{opacity:0; transform:translateY(10px);}
    to{opacity:1; transform:translateY(0);}
}

/* Buttons */
.btn-modern{
    background:linear-gradient(45deg,#5a5af5,#9b59ff);
    border:none;
    padding:10px 18px;
    border-radius:10px;
    color:white;
    transition:0.2s;
}

.btn-modern:hover{
    transform:translateY(-2px);
    box-shadow:0 8px 20px rgba(90,90,255,0.5);
}

.back-btn{
    border:1px solid #7a7aff;
    color:#dcdcff;
}

.back-btn:hover{
    background:#5a5af5;
    border:1px solid #5a5af5;
}

/* Floating Loader Overlay */
#loaderOverlay{
  position: fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,.82);
  display:none;
  z-index:9999;
  backdrop-filter: blur(6px);
}

.loader-card{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%, -50%);
  text-align:center;
  background:linear-gradient(145deg,#111428,#1b1f3a);
  padding:35px;
  border-radius:18px;
  border:1px solid rgba(255,255,255,.15);
  box-shadow:0 0 40px rgba(0,0,0,.5);
  color:white;
}

.spinner{
  width:80px;
  height:80px;
  border-radius:50%;
  border:6px solid rgba(255,255,255,.2);
  border-top:6px solid #7c4dff;
  margin:auto;
  animation: spin 1s linear infinite;
}

@keyframes spin{
  100%{transform:rotate(360deg);}
}
</style>
</head>

<body>

<div class="container container-center">

<div class="card-box">

    <h2>📝 AI Chapter Summary</h2>
    <span class="subtitle">
        File: <b>{{filename}}</b>
    </span>

    <div class="divider"></div>

    <div class="summary-container">
        <div class="summary-text">
            {{summary}}
        </div>
    </div>

    <div class="mt-4 d-flex gap-3">
        <a href="/chapters" onclick="showLoader()" class="btn btn-modern">
            📚 Choose Another Chapter
        </a>

        <a href="/upload" class="btn back-btn">
            ⬅ Upload Another PDF
        </a>
    </div>

</div>

</div>

<!-- ===== Floating Loader Overlay ===== -->
<div id="loaderOverlay">
  <div class="loader-card">
      <div class="spinner"></div>
      <h3>AI is Working…</h3>
      <p>Please wait, processing may take 20–90 seconds</p>
  </div>
</div>

<script>
function showLoader(){
    document.getElementById("loaderOverlay").style.display = "block";
}
</script>

</body>
</html>
